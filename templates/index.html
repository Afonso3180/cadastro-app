<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Formulário de Inscrição</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="pagina">
    <div class="cartao">
      <h1>Formulário de Inscrição</h1>
      <p class="subtitulo">Preencha os campos abaixo para se cadastrar.</p>

      {% with mensagens = get_flashed_messages(with_categories=true) %}
        {% if mensagens %}
          <ul class="alertas" role="alert">
            {% for categoria, msg in mensagens %}
              <li>{{ msg }}</li>
            {% endfor %}
          </ul>
        {% endif %}
      {% endwith %}

      <form method="post" action="{{ url_for('index') }}" novalidate>
        <div class="campo">
          <label for="nome">Nome completo</label>
          <input
            type="text"
            id="nome"
            name="nome"
            placeholder="Digite seu nome completo"
            value="{{ valores.nome }}"
            autocomplete="name"
            required
            minlength="3">
        </div>

        <div class="campo">
          <label for="cpf">CPF</label>
          <input
            type="text"
            id="cpf"
            name="cpf"
            placeholder="000.000.000-00"
            value="{{ valores.cpf }}"
            inputmode="numeric"
            autocomplete="off"
            required
            maxlength="14">
        </div>

        <div class="campo">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="seuemail@exemplo.com"
            value="{{ valores.email }}"
            autocomplete="email"
            required>
        </div>

        <button type="submit" id="btn-enviar" class="botao">Enviar cadastro</button>
      </form>
    </div>
  </main>
</body>
</html>
